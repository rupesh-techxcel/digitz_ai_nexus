<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">

  <!-- Background: deep navy → brand blue → Nexus teal diagonal -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <!-- Subtle inner frame ring -->
  <rect x="10" y="10" width="492" height="492" rx="98" fill="none" stroke="#1E4A9E" stroke-width="3" opacity="0.35"/>

  <!-- Antenna: stem + gold ball — classic robot signal -->
  <rect x="248" y="16" width="16" height="62" rx="8" fill="#8FE2C6"/>
  <circle cx="256" cy="12" r="22" fill="#F4D88F"/>
  <circle cx="256" cy="12" r="11" fill="#E0A820"/>
  <!-- Tiny glow ring on antenna ball -->
  <circle cx="256" cy="12" r="20" fill="none" stroke="#FFFBE0" stroke-width="2" opacity="0.5"/>

  <!-- ═══════════════════════════════ -->
  <!--  LETTER  N  — dominant element  -->
  <!-- ═══════════════════════════════ -->
  <!-- Left upright -->
  <rect x="86" y="80" width="68" height="356" rx="10" fill="white"/>
  <!-- Right upright -->
  <rect x="358" y="80" width="68" height="356" rx="10" fill="white"/>
  <!-- Diagonal stroke connecting top-of-left to bottom-of-right -->
  <polygon points="154,80 222,80 358,436 290,436" fill="white"/>

  <!-- ═══════════════════════════════ -->
  <!--  ROBOT EYES embedded in uprights -->
  <!-- ═══════════════════════════════ -->

  <!-- Left eye (on left upright, center x=120) -->
  <circle cx="120" cy="194" r="27" fill="#0B1A4A"/>
  <circle cx="120" cy="194" r="21" fill="#16A37F"/>
  <circle cx="120" cy="194" r="11" fill="#0B1A4A"/>
  <!-- Eye highlight -->
  <circle cx="112" cy="185" r="5" fill="white"/>

  <!-- Right eye (on right upright, center x=392) -->
  <circle cx="392" cy="194" r="27" fill="#0B1A4A"/>
  <circle cx="392" cy="194" r="21" fill="#16A37F"/>
  <circle cx="392" cy="194" r="11" fill="#0B1A4A"/>
  <circle cx="384" cy="185" r="5" fill="white"/>

  <!-- ═══════════════════════════════ -->
  <!--  CHAT BUBBLE badge — bottom right -->
  <!-- ═══════════════════════════════ -->
  <!-- Bubble body -->
  <rect x="366" y="448" width="118" height="52" rx="20" fill="#16A37F"/>
  <!-- Tail pointing left -->
  <path d="M 368 484 L 334 506 L 374 492" fill="#16A37F"/>
  <!-- Typing dots -->
  <circle cx="398" cy="474" r="8" fill="white" opacity="0.95"/>
  <circle cx="425" cy="474" r="8" fill="white" opacity="0.95"/>
  <circle cx="452" cy="474" r="8" fill="white" opacity="0.95"/>

  <!-- Subtle bottom arc below the N (smile hint) -->
  <path d="M 188 450 Q 256 494 324 450" stroke="#8FE2C6" stroke-width="12" fill="none" stroke-linecap="round" opacity="0.7"/>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0A1840"/>
      <stop offset="55%" stop-color="#163888"/>
      <stop offset="100%" stop-color="#0C6E52"/>
    </linearGradient>
  </defs>

</svg>
