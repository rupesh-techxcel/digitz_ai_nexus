<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">

  <!-- Light panel background -->
  <rect width="512" height="512" rx="116" fill="#f0faf8"/>
  <rect width="512" height="512" rx="116" stroke="#8fe2c6" stroke-width="14" fill="none"/>

  <!-- Green Nexus fill circle = body of the Q letterform -->
  <circle cx="256" cy="240" r="160" fill="#16A37F"/>
  <circle cx="256" cy="240" r="160" stroke="rgba(255,255,255,0.20)" stroke-width="8" fill="none"/>

  <!-- Navy Q ring -->
  <circle cx="256" cy="240" r="168" stroke="#17439D" stroke-width="18" fill="none"/>

  <!-- Q tail — exits bottom-right -->
  <line x1="375" y1="359" x2="406" y2="390"
        stroke="#17439D" stroke-width="18" stroke-linecap="round"/>

  <!-- Blue accent dot at tail end -->
  <circle cx="414" cy="398" r="16" fill="#4a7dff"/>

  <!-- Bold white N (three round-cap strokes, centred in circle) -->
  <line x1="186" y1="320" x2="186" y2="160"
        stroke="#FFFFFF" stroke-width="36" stroke-linecap="round"/>
  <line x1="186" y1="160" x2="326" y2="320"
        stroke="#FFFFFF" stroke-width="36" stroke-linecap="round"/>
  <line x1="326" y1="160" x2="326" y2="320"
        stroke="#FFFFFF" stroke-width="36" stroke-linecap="round"/>

  <!-- Q&A — prominent, outside the Q ring, below the N -->
  <text x="256" y="470" text-anchor="middle"
        fill="#17439D" font-size="48" font-weight="800"
        font-family="Inter, Arial, sans-serif" letter-spacing="8">Q&amp;A</text>

</svg>
